<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equestrian Events 2026</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#0f172a;
color:white;
}

header{
padding:18px;
text-align:center;
font-size:26px;
background:#111827;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* Tabs */

.tabs{
display:flex;
border-bottom:2px solid #334155;
margin-bottom:15px;
}

.tab{
padding:10px 18px;
cursor:pointer;
}

.tab.active{
background:#22c55e;
border-radius:6px 6px 0 0;
}

/* Filters */

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

select{
padding:7px;
border-radius:6px;
border:none;
background:#1e293b;
color:white;
}

/* Table */

.tableWrapper{
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
min-width:360px;
border-collapse:collapse;
background:#1e293b;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
background:#334155;
}

/* Calendar */

.monthWrapper{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.month{
background:#111827;
padding:10px;
border-radius:8px;
}

.monthTitle{
text-align:center;
font-size:20px;
margin-bottom:8px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
}

.dayHeader{
text-align:center;
font-weight:bold;
font-size:12px;
}

.day{
background:#1e293b;
min-height:85px;
padding:4px;
border-radius:6px;
font-size:12px;
position:relative;
}

.date{
font-weight:bold;
}

.event{
background:#ef4444;
margin-top:2px;
padding:2px 4px;
border-radius:4px;
font-size:11px;
cursor:pointer;
}

.hidden{
display:none;
}

/* Popup */

.popup{
position:fixed;
background:#111827;
border:1px solid #334155;
padding:10px;
border-radius:8px;
font-size:13px;
width:220px;
pointer-events:none;
z-index:999;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.popupTitle{
font-weight:bold;
margin-bottom:6px;
color:#22c55e;
}

/* ── Responsive: tablet ─────────────────────────────────── */
@media(max-width:900px){
.monthWrapper{
grid-template-columns:1fr;
}
.day{
min-height:65px;
}
}

/* ── Responsive: mobile ─────────────────────────────────── */
@media(max-width:600px){
header{
font-size:18px;
padding:12px 10px;
}
.container{
padding:10px;
}
.tab{
padding:10px 14px;
font-size:14px;
flex:1;
text-align:center;
}
.controls{
gap:8px;
}
.controls select{
flex:1 1 calc(50% - 8px);
min-width:0;
font-size:14px;
}
.monthTitle{
font-size:16px;
}
.dayHeader{
font-size:10px;
}
.calendar{
gap:2px;
}
.day{
min-height:48px;
padding:2px;
font-size:10px;
}
.event{
font-size:9px;
padding:1px 3px;
}
.popup{
width:170px;
font-size:12px;
}
th,td{
padding:8px 6px;
font-size:13px;
}
}

</style>
</head>

<body>

<header>2026 Equestrian Competition Calendar</header>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="openTab('calendar')">Calendar</div>
<div class="tab" onclick="openTab('table')">Table</div>
</div>

<!-- CALENDAR TAB -->

<div id="calendarTab">

<div class="controls">

<select id="monthSelect">
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>Aug</option>
<option>Sept</option>
<option>Oct</option>
<option>Nov</option>
<option>Dec</option>
</select>

<select id="venueFilterC">
<option value="">All Venues</option>
<option>Surge</option>
<option>EIRS</option>
</select>

<select id="eventFilterC">
<option value="">All Events</option>
<option>SEL</option>
<option>CSI</option>
<option>EPL</option>
<option>REL</option>
<option>KSEC</option>
<option>CDI</option>
</select>

<select id="monthsToShow">
<option value="1">1 Month</option>
<option value="2">2 Months</option>
</select>

</div>

<div id="calendar"></div>

</div>

<!-- TABLE TAB -->

<div id="tableTab" class="hidden">

<div class="controls">

<select id="monthFilterT">
<option value="">All Months</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>Aug</option>
<option>Sept</option>
<option>Oct</option>
<option>Nov</option>
<option>Dec</option>
</select>

<select id="eventFilterT">
<option value="">All Events</option>
<option>SEL</option>
<option>CSI</option>
<option>EPL</option>
<option>REL</option>
<option>KSEC</option>
<option>CDI</option>
<option>JNEC</option>
</select>

<select id="venueFilterT">
<option value="">All Venues</option>
<option>Surge</option>
<option>EIRS</option>
</select>

</div>

<div class="tableWrapper"><div id="table"></div></div>

</div>

</div>

<div id="popup" class="popup hidden"></div>

<script>

const months=[
"January","February","March","April","May","June",
"July","Aug","Sept","Oct","Nov","Dec"
]

const events=[

{month:"April",start:3,end:5,event:"SEL",venue:"Surge"},
{month:"April",start:23,end:25,event:"CSI",venue:"Surge"},
{month:"April",start:24,end:25,event:"REL",venue:"EIRS"},
{month:"April",start:26,end:26,event:"KSEC",venue:"EIRS"},

{month:"May",start:1,end:3,event:"SEL",venue:"Surge"},
{month:"May",start:22,end:23,event:"REL",venue:"EIRS"},
{month:"May",start:24,end:24,event:"KSEC",venue:"EIRS"},

{month:"June",start:22,end:24,event:"SEL",venue:"Surge"},
{month:"June",start:26,end:28,event:"CSI",venue:"Surge"},
{month:"June",start:27,end:28,event:"EPL",venue:"EIRS"},

{month:"July",start:25,end:26,event:"EPL",venue:"EIRS"},
{month:"July",start:28,end:30,event:"SEL",venue:"Surge"},

{month:"Aug",start:16,end:16,event:"KSEC",venue:"EIRS"},
{month:"Aug",start:24,end:27,event:"SEL",venue:"Surge"},
{month:"Aug",start:29,end:30,event:"EPL",venue:"EIRS"},

{month:"Sept",start:3,end:5,event:"CSI",venue:"Surge"},
{month:"Sept",start:5,end:6,event:"EPL",venue:"EIRS"},

{month:"Oct",start:14,end:17,event:"CDI",venue:"Surge"},
{month:"Oct",start:18,end:20,event:"SEL",venue:"Surge"},
{month:"Oct",start:22,end:24,event:"CSI",venue:"Surge"},
{month:"Oct",start:24,end:25,event:"EPL",venue:"EIRS"},

{month:"Nov",start:26,end:28,event:"EPL",venue:"EIRS"}

]

function openTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

if(tab==="calendar"){
calendarTab.classList.remove("hidden")
tableTab.classList.add("hidden")
document.querySelectorAll(".tab")[0].classList.add("active")
}else{
calendarTab.classList.add("hidden")
tableTab.classList.remove("hidden")
document.querySelectorAll(".tab")[1].classList.add("active")
}

}

function renderCalendar(){

let startMonth=monthSelect.value
let monthsCount=parseInt(monthsToShow.value)

let startIndex=months.indexOf(startMonth)

let venue=venueFilterC.value
let eventType=eventFilterC.value

let html=`<div class="monthWrapper">`

for(let m=0;m<monthsCount;m++){

let month=months[startIndex+m]
if(!month) break

let monthEvents=events.filter(e=>
e.month===month &&
(!venue||e.venue===venue) &&
(!eventType||e.event===eventType)
)

let days=new Date(2026,startIndex+m+1,0).getDate()
let firstDay=new Date(2026,startIndex+m,1).getDay()

html+=`<div class="month">
<div class="monthTitle">${month}</div>

<div class="calendar">
<div class="dayHeader">Sun</div>
<div class="dayHeader">Mon</div>
<div class="dayHeader">Tue</div>
<div class="dayHeader">Wed</div>
<div class="dayHeader">Thu</div>
<div class="dayHeader">Fri</div>
<div class="dayHeader">Sat</div>
`

for(let i=0;i<firstDay;i++) html+=`<div></div>`

for(let d=1; d<=days; d++){

html+=`<div class="day"><div class="date">${d}</div>`

monthEvents.forEach(ev=>{
if(d>=ev.start && d<=ev.end){
html+=`<div class="event"
onmouseenter="showPopup(event,'${ev.event}','${ev.venue}','${ev.start}-${ev.end}','${month}')"
onmouseleave="hidePopup()"
onclick="clickPopup(event,'${ev.event}','${ev.venue}','${ev.start}-${ev.end}','${month}')"
>${ev.event}</div>`
}
})

html+=`</div>`
}

html+=`</div></div>`

}

html+=`</div>`

calendar.innerHTML=html

}

function renderTable(){

let m=monthFilterT.value
let e=eventFilterT.value
let v=venueFilterT.value

let data=events.filter(x=>
(!m||x.month===m)&&
(!e||x.event===e)&&
(!v||x.venue===v)
)

let html=`<table>
<tr>
<th>Month</th>
<th>Date</th>
<th>Event</th>
<th>Venue</th>
</tr>`

data.forEach(x=>{
html+=`
<tr>
<td>${x.month}</td>
<td>${x.start}-${x.end}</td>
<td>${x.event}</td>
<td>${x.venue}</td>
</tr>`
})

html+=`</table>`

table.innerHTML=html

}

function showPopup(e,name,venue,startEnd,month){

let details=name==="CSI"?"CSI 1*, CSI-CH and CSI J":name

popup.innerHTML=`
<div class="popupTitle">${details}</div>
<div><b>Venue:</b> ${venue}</div>
<div><b>Date:</b> ${startEnd} ${month}</div>
`

popup.classList.remove("hidden")

let x=e.clientX+10
let y=e.clientY+10
const pw=popup.offsetWidth
const ph=popup.offsetHeight
if(x+pw>window.innerWidth) x=e.clientX-pw-10
if(y+ph>window.innerHeight) y=e.clientY-ph-10
popup.style.left=Math.max(0,Math.min(x,window.innerWidth-pw))+"px"
popup.style.top=Math.max(0,Math.min(y,window.innerHeight-ph))+"px"

}

function hidePopup(){
popup.classList.add("hidden")
}

function clickPopup(e,name,venue,startEnd,month){
e.stopPropagation()
showPopup(e,name,venue,startEnd,month)
}

document.addEventListener("click",hidePopup)

document.querySelectorAll("select").forEach(x=>{
x.onchange=()=>{
renderCalendar()
renderTable()
}
})

renderCalendar()
renderTable()

</script>

</body>
</html>
